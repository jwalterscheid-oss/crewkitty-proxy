<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CrewKitty Platform</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f4f6f8; color: #1a1a2e; }
  .wrap { max-width: 860px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.5rem; margin-bottom: 16px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 20px; }
  label { display: block; font-weight: 600; margin: 12px 0 6px; font-size: .9rem; }
  input { width: 100%; padding: 10px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 1rem; }
  button { padding: 10px 16px; background: #635bff; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 14px; }
  button.gray { background: #6b7280; }
  table { width: 100%; border-collapse: collapse; margin-top: 8px; }
  th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid #eee; font-size: .9rem; }
  .big { font-size: 1.6rem; font-weight: 700; }
  .msg { margin-top: 12px; font-size: .9rem; }
  .err { color: #c0392b; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CrewKitty Platform</h1>

  <div class="card" id="login">
    <label>Platform password</label>
    <input id="pw" type="password">
    <button onclick="unlock()">Unlock</button>
    <div class="msg err" id="loginErr"></div>
  </div>

  <div id="panel" style="display:none">
    <div class="card">
      <div>Total fees earned (1% per transaction)</div>
      <div class="big" id="totalFees">$0.00</div>
      <button class="gray" onclick="setupIssuing()">Set up card payments (one time)</button>
      <div class="msg" id="setupMsg"></div>
    </div>
    <div class="card">
      <h2 style="font-size:1.1rem">Companies</h2>
      <table>
        <thead><tr><th>Company</th><th>Email</th><th>Employees</th><th>Payments</th><th>Volume</th><th>Fees owed to you</th></tr></thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </div>
</div>
<script>
const P='/functions/v1/app';
let PW = '';
const H = () => ({ 'Content-Type': 'application/json', 'x-admin-password': PW });
const fmt = c => '$' + ((c||0)/100).toFixed(2);

async function unlock() {
  PW = document.getElementById('pw').value;
  const res = await fetch(P+'/api/platform/summary', { headers: H() });
  if (!res.ok) { document.getElementById('loginErr').textContent = 'Wrong password'; return; }
  document.getElementById('login').style.display = 'none';
  document.getElementById('panel').style.display = 'block';
  render(await res.json());
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function render(list) {
  const tb = document.getElementById('rows');
  tb.innerHTML = '';
  let total = 0;
  list.forEach(c => {
    total += c.fees_cents || 0;
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><strong>${esc(c.name)}</strong></td><td>${esc(c.email)}</td>
      <td>${c.employees}</td><td>${c.payments}</td><td>${fmt(c.volume_cents)}</td><td><strong>${fmt(c.fees_cents)}</strong></td>`;
    tb.appendChild(tr);
  });
  document.getElementById('totalFees').textContent = fmt(total);
}

async function setupIssuing() {
  const msg = document.getElementById('setupMsg');
  msg.textContent = 'Setting up...';
  const res = await fetch(P+'/api/platform/setup-issuing', { method: 'POST', headers: H() });
  const data = await res.json();
  msg.textContent = res.ok ? data.message : (data.error || 'Setup failed');
}
</script>
</body>
</html>
