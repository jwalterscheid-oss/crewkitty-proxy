<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CrewKitty</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f4f6f8; color: #1a1a2e; }
  .wrap { max-width: 480px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  p.sub { color: #666; margin-bottom: 24px; }
  .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  label { display: block; font-weight: 600; margin: 16px 0 6px; font-size: .9rem; }
  select, input { width: 100%; padding: 12px; border: 1px solid #d0d5dd; border-radius: 8px; font-size: 1rem; }
  button { width: 100%; margin-top: 24px; padding: 14px; background: #635bff; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  button:hover { background: #5147f0; }
  button:disabled { background: #aaa; cursor: not-allowed; }
  .err { color: #c0392b; margin-top: 12px; font-size: .9rem; }
  .empty { color: #888; text-align: center; padding: 24px 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>CrewKitty</h1>
  <p class="sub">Choose who you want to pay and the amount.</p>
  <div class="card">
    <div id="form" style="display:none">
      <label for="merchant">Business</label>
      <select id="merchant"></select>
      <label for="amount">Amount (USD)</label>
      <input id="amount" type="number" min="0.50" step="0.01" placeholder="100.00">
      <label for="desc">What's this for? (optional)</label>
      <input id="desc" type="text" placeholder="Invoice #1234">
      <button id="pay">Continue to payment</button>
      <div class="err" id="err"></div>
    </div>
    <div class="empty" id="empty" style="display:none">No businesses are available to pay right now.</div>
  </div>
</div>
<script>
const P='/functions/v1/app';
const CID = new URLSearchParams(location.search).get('c');
async function init() {
  if (!CID) { const e = document.getElementById('empty'); e.textContent = 'Open the payment link the business gave you.'; e.style.display = 'block'; return; }
  const res = await fetch(P+'/api/merchants?c='+encodeURIComponent(CID));
  const merchants = await res.json();
  if (!merchants.length) { document.getElementById('empty').style.display = 'block'; return; }
  const sel = document.getElementById('merchant');
  merchants.forEach(m => {
    const o = document.createElement('option');
    o.value = m.id; o.textContent = m.businessName;
    sel.appendChild(o);
  });
  document.getElementById('form').style.display = 'block';
}
document.getElementById('pay').onclick = async () => {
  const btn = document.getElementById('pay');
  const err = document.getElementById('err');
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Redirecting…';
  try {
    const res = await fetch(P+'/api/checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        merchantId: document.getElementById('merchant').value,
        amount: document.getElementById('amount').value,
        description: document.getElementById('desc').value
      })
    });
    const data = await res.json();
    if (data.url) { location.href = data.url; return; }
    err.textContent = data.error || 'Something went wrong';
  } catch (e) { err.textContent = e.message; }
  btn.disabled = false; btn.textContent = 'Continue to payment';
};
init();
</script>
</body>
</html>
